<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Timeline of Music | Composer Timeline Explorer</title>
    <meta name="robots" content="index, follow">
    <meta name="author" content="Bruce Yang">
    <meta name="theme-color" content="#f8f3ea">
    <meta name="format-detection" content="telephone=no">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=UnifrakturCook:wght@700&display=swap" rel="stylesheet">
    <link rel="canonical" href="https://bruce-yang-422.github.io/composer-timeline-explorer/">
    <meta
      name="description"
      content="以時間軸探索音樂史，串連作曲家生平、代表作品與時代背景的互動式古典音樂網站。"
    >
    <meta
      name="keywords"
      content="Timeline of Music, Composer Timeline Explorer, 古典音樂, 作曲家, 音樂時間軸, Beethoven, 貝多芬, music history, composer timeline"
    >
    <meta property="og:locale" content="zh_TW">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Timeline of Music">
    <meta property="og:title" content="Timeline of Music | Composer Timeline Explorer">
    <meta
      property="og:description"
      content="以時間軸探索音樂史，串連作曲家生平、代表作品與時代背景的互動式古典音樂網站。"
    >
    <meta property="og:url" content="https://bruce-yang-422.github.io/composer-timeline-explorer/">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Timeline of Music | Composer Timeline Explorer">
    <meta
      name="twitter:description"
      content="以時間軸探索音樂史，串連作曲家生平、代表作品與時代背景的互動式古典音樂網站。"
    >
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Timeline of Music",
        "alternateName": "Composer Timeline Explorer",
        "url": "https://bruce-yang-422.github.io/composer-timeline-explorer/",
        "inLanguage": "zh-Hant",
        "description": "以時間軸探索音樂史，串連作曲家生平、代表作品與時代背景的互動式古典音樂網站。",
        "author": {
          "@type": "Person",
          "name": "Bruce Yang"
        }
      }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
      :root {
        --color-bg: #F4F6F9;
        --color-surface: #FFFFFF;
        --color-border: #DDE2EB;
        --color-ink: #111827;
        --color-muted: #6B7280;
        --color-accent: #2F2A24;
        --color-accent-light: #F1ECE3;
        --color-timeline: #1D4ED8;
        --color-context: #B45309;
        --font-display: "Cormorant Garamond", Georgia, "Times New Roman", serif;
        --font-display-news: "UnifrakturCook", "Times New Roman", serif;
        --font-body: "Segoe UI", "Noto Sans TC", sans-serif;
      }

      body {
        min-height: 100vh;
        color: var(--color-ink);
        background-color: var(--color-bg);
        font-family: var(--font-body);
      }

      a {
        color: var(--color-accent);
      }

      .app-shell {
        width: 100%;
        max-width: 80rem;
        margin: 0 auto;
        padding: 1.5rem 1rem;
      }

      .hero-block {
        display: flex;
        flex-direction: column;
        gap: 1rem;
        border: 1px solid #b9b1a5;
        border-radius: 0.25rem;
        background:
          linear-gradient(180deg, rgba(91, 78, 62, 0.05), rgba(91, 78, 62, 0.02)),
          linear-gradient(135deg, #f8f3ea 0%, #fffdf8 100%);
        box-shadow: 0 8px 18px rgba(36, 28, 21, 0.06);
        padding: 1.75rem;
      }

      .hero-eyebrow {
        margin-bottom: 0.5rem;
        color: var(--color-accent);
        font-size: 0.7rem;
        font-weight: 600;
        letter-spacing: 0.24em;
        text-transform: uppercase;
      }

      .hero-title {
        font-family: var(--font-display-news);
        max-width: none;
        font-size: clamp(2.3rem, 5vw, 4rem);
        font-weight: 700;
        letter-spacing: 0.01em;
        color: var(--color-ink);
        line-height: 1.02;
        text-shadow: 0 1px 0 rgba(255, 255, 255, 0.55);
      }

      .hero-divider {
        width: min(100%, 42rem);
        height: 2px;
        margin-top: 0.85rem;
        background: linear-gradient(90deg, rgba(47, 42, 36, 0.95), rgba(47, 42, 36, 0.15));
      }

      .hero-title-secondary {
        margin-top: 0.7rem;
        color: var(--color-muted);
        font-size: 0.8rem;
        font-weight: 600;
        letter-spacing: 0.28em;
        text-transform: uppercase;
      }

      .hero-title-secondary strong {
        font-family: var(--font-display);
        font-size: 1.05rem;
        letter-spacing: 0.12em;
        color: var(--color-ink);
      }

      .hero-subtitle {
        max-width: 42rem;
        margin-top: 1rem;
        color: var(--color-muted);
        font-size: 0.92rem;
        line-height: 1.85;
      }

      .panel-card {
        border: 1px solid var(--color-border);
        border-radius: 0.75rem;
        background: var(--color-surface);
      }

      .panel-header {
        padding: 1.25rem 1.25rem 0;
        border-bottom: 1px solid var(--color-border);
        padding-bottom: 1rem;
      }

      .panel-title {
        font-size: 0.875rem;
        font-weight: 600;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        color: var(--color-muted);
      }

      .panel-description {
        margin-top: 0.25rem;
        color: var(--color-muted);
        font-size: 0.8rem;
        line-height: 1.6;
      }

      .panel-body {
        padding: 1rem;
      }

      .data-card {
        padding: 0.875rem 1rem;
        border: 1px solid var(--color-border);
        border-radius: 0.5rem;
        background: #FAFBFC;
      }

      .data-card-meta {
        color: var(--color-muted);
        font-size: 0.8rem;
        font-weight: 500;
        letter-spacing: 0.02em;
      }

      .timeline-button {
        display: grid;
        width: 100%;
        gap: 0.5rem;
        padding: 0.875rem 1rem;
        text-align: left;
        border: 1px solid var(--color-border);
        border-left: 3px solid var(--color-accent);
        border-radius: 0.5rem;
        background: var(--color-surface);
        transition: background 0.1s ease;
        cursor: pointer;
      }

      .timeline-button:hover {
        background: #FAFBFC;
      }

      .timeline-button.is-active {
        border-left-color: var(--color-accent);
        background: var(--color-accent-light);
      }

      .timeline-event {
        padding: 0.875rem 1rem;
        border: 1px solid var(--color-border);
        border-left: 3px solid var(--color-timeline);
        border-radius: 0.5rem;
        background: #F8FAFF;
      }

      .context-card {
        padding: 0.875rem 1rem;
        border: 1px solid var(--color-border);
        border-left: 3px solid var(--color-context);
        border-radius: 0.5rem;
        background: #FFFBF5;
      }

      .field-group {
        display: grid;
        gap: 0.375rem;
      }

      .field-label {
        color: var(--color-muted);
        font-size: 0.75rem;
        font-weight: 600;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .field-control {
        min-width: 180px;
        padding: 0.5rem 0.75rem;
        border: 1px solid var(--color-border);
        border-radius: 0.375rem;
        background: var(--color-surface);
        color: var(--color-ink);
        font-size: 0.875rem;
        outline: none;
        transition: border-color 0.15s ease, box-shadow 0.15s ease;
      }

      .field-control:focus {
        border-color: var(--color-accent);
        box-shadow: 0 0 0 2px rgba(185, 28, 28, 0.1);
      }

      .chip {
        display: inline-flex;
        align-items: center;
        border-radius: 0.25rem;
        background: var(--color-accent-light);
        border: 1px solid rgba(185, 28, 28, 0.15);
        padding: 0.2rem 0.6rem;
        color: var(--color-accent);
        font-size: 0.75rem;
        font-weight: 600;
        letter-spacing: 0.02em;
      }

      .note-box {
        padding: 0.875rem 1rem;
        border: 1px solid var(--color-border);
        border-radius: 0.5rem;
        background: #F8F9FB;
        color: var(--color-muted);
        font-size: 0.8rem;
        line-height: 1.7;
      }

      .video-frame {
        position: relative;
        width: 100%;
        overflow: hidden;
        border-radius: 0.5rem;
        background: #000;
        aspect-ratio: 16 / 9;
      }

      .video-frame iframe {
        width: 100%;
        height: 100%;
        border: 0;
      }

      .filter-chip {
        display: inline-flex;
        align-items: center;
        padding: 0.25rem 0.625rem;
        border: 1px solid var(--color-border);
        border-radius: 0.25rem;
        background: var(--color-surface);
        color: var(--color-muted);
        font-size: 0.75rem;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.1s ease, border-color 0.1s ease, color 0.1s ease;
      }

      .filter-chip:hover {
        background: #F4F6F9;
        border-color: #C4C9D4;
      }

      .filter-chip.is-on {
        background: var(--color-accent-light);
        border-color: rgba(185, 28, 28, 0.25);
        color: var(--color-accent);
        font-weight: 600;
      }

      .button-link {
        display: inline-flex;
        width: fit-content;
        align-items: center;
        justify-content: center;
        padding: 0.5rem 1rem;
        border-radius: 0.375rem;
        background: var(--color-accent);
        color: #fff;
        text-decoration: none;
        font-size: 0.875rem;
        font-weight: 600;
        transition: background 0.15s ease;
      }

      .button-link:hover {
        background: #991B1B;
      }

      @media (min-width: 768px) {
        .app-shell {
          padding: 1.5rem 2rem;
        }

        .hero-block {
          flex-direction: row;
          align-items: flex-start;
          justify-content: space-between;
        }

        .panel-header {
          padding: 1.25rem 1.5rem 1rem;
        }

        .panel-body {
          padding: 1.25rem 1.5rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <header class="hero-block" data-region="control-bar">
        <div>
          <p class="hero-eyebrow">時間中的音樂 Music in Time</p>
          <h1 class="hero-title">Timeline of Music</h1>
          <div class="hero-divider" aria-hidden="true"></div>
          <p class="hero-title-secondary"><strong>Composer Timeline Explorer</strong></p>
          <p class="hero-subtitle">用時間作為閱讀軸線，串連音樂家的生平、作品與時代背景，讓古典音樂不只可聽，也更容易被理解。</p>
        </div>
        <div id="control-bar" class="w-full md:w-auto"></div>
      </header>

      <section class="panel-card mt-4" aria-labelledby="gantt-heading">
        <div class="panel-header">
          <h2 id="gantt-heading" class="panel-title">甘特圖時間軸</h2>
          <p class="panel-description">作曲家生涯與作品分布一覽，點擊圓點可切換預覽。</p>
        </div>
        <div id="gantt-view" class="panel-body"></div>
      </section>

      <main class="mt-4 grid gap-4 xl:grid-cols-[minmax(260px,1fr)_minmax(400px,1.6fr)_minmax(260px,1fr)]">
        <aside class="panel-card" aria-labelledby="timeline-heading">
          <div class="panel-header">
            <h2 id="timeline-heading" class="panel-title">時間軸</h2>
            <p class="panel-description">生平記事與作品清單。</p>
          </div>
          <section id="timeline-view" class="panel-body" style="max-height:640px;overflow-y:auto"></section>
        </aside>

        <section class="panel-card" aria-labelledby="preview-heading">
          <div class="panel-header">
            <h2 id="preview-heading" class="panel-title">作品預覽</h2>
            <p class="panel-description">選中作品的詳細資訊與影音內容。</p>
          </div>
          <section id="preview-panel" class="panel-body"></section>
        </section>

        <aside class="panel-card" aria-labelledby="guide-heading">
          <div class="panel-header">
            <h2 id="guide-heading" class="panel-title">音樂說明導聆</h2>
            <p class="panel-description">作品脈絡、時期定位與欣賞導引。</p>
          </div>
          <section id="guide-panel" class="panel-body"></section>
        </aside>
      </main>

      <section class="panel-card mt-4" aria-labelledby="context-heading">
        <div class="panel-header">
          <h2 id="context-heading" class="panel-title">時代背景層</h2>
          <p class="panel-description">補充歷史事件、文化環境與音樂風格趨勢。</p>
        </div>
        <section id="context-panel" class="panel-body"></section>
      </section>
    </div>

    <script type="module" src="./assets/js/app.js"></script>
  </body>
</html>
