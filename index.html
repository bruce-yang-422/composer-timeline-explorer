<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>時間中的音樂 Music in Time</title>
    <meta
      name="description"
      content="以時間軸連結音樂、作曲家生平與歷史脈絡的互動式網站。"
    >
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
      :root {
        --color-bg: #F4F6F9;
        --color-surface: #FFFFFF;
        --color-border: #DDE2EB;
        --color-ink: #111827;
        --color-muted: #6B7280;
        --color-accent: #B91C1C;
        --color-accent-light: #FEF2F2;
        --color-timeline: #1D4ED8;
        --color-context: #B45309;
        --font-display: Georgia, "Times New Roman", serif;
        --font-body: "Segoe UI", "Noto Sans TC", sans-serif;
      }

      body {
        min-height: 100vh;
        color: var(--color-ink);
        background-color: var(--color-bg);
        font-family: var(--font-body);
      }

      a {
        color: var(--color-accent);
      }

      .app-shell {
        width: 100%;
        max-width: 80rem;
        margin: 0 auto;
        padding: 1.5rem 1rem;
      }

      .hero-block {
        display: flex;
        flex-direction: column;
        gap: 1rem;
        border: 1px solid var(--color-border);
        border-radius: 0.75rem;
        background: var(--color-surface);
        padding: 1.5rem;
      }

      .hero-eyebrow {
        margin-bottom: 0.5rem;
        color: var(--color-accent);
        font-size: 0.75rem;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      .hero-title {
        font-family: var(--font-display);
        font-size: clamp(2rem, 5vw, 3.25rem);
        font-weight: 700;
        letter-spacing: -0.01em;
        color: var(--color-ink);
      }

      .hero-subtitle {
        max-width: 42rem;
        margin-top: 0.5rem;
        color: var(--color-muted);
        font-size: 0.9rem;
        line-height: 1.75;
      }

      .panel-card {
        border: 1px solid var(--color-border);
        border-radius: 0.75rem;
        background: var(--color-surface);
      }

      .panel-header {
        padding: 1.25rem 1.25rem 0;
        border-bottom: 1px solid var(--color-border);
        padding-bottom: 1rem;
      }

      .panel-title {
        font-size: 0.875rem;
        font-weight: 600;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        color: var(--color-muted);
      }

      .panel-description {
        margin-top: 0.25rem;
        color: var(--color-muted);
        font-size: 0.8rem;
        line-height: 1.6;
      }

      .panel-body {
        padding: 1rem;
      }

      .data-card {
        padding: 0.875rem 1rem;
        border: 1px solid var(--color-border);
        border-radius: 0.5rem;
        background: #FAFBFC;
      }

      .data-card-meta {
        color: var(--color-muted);
        font-size: 0.8rem;
        font-weight: 500;
        letter-spacing: 0.02em;
      }

      .timeline-button {
        display: grid;
        width: 100%;
        gap: 0.5rem;
        padding: 0.875rem 1rem;
        text-align: left;
        border: 1px solid var(--color-border);
        border-left: 3px solid var(--color-accent);
        border-radius: 0.5rem;
        background: var(--color-surface);
        transition: background 0.1s ease;
        cursor: pointer;
      }

      .timeline-button:hover {
        background: #FAFBFC;
      }

      .timeline-button.is-active {
        border-left-color: var(--color-accent);
        background: var(--color-accent-light);
      }

      .timeline-event {
        padding: 0.875rem 1rem;
        border: 1px solid var(--color-border);
        border-left: 3px solid var(--color-timeline);
        border-radius: 0.5rem;
        background: #F8FAFF;
      }

      .context-card {
        padding: 0.875rem 1rem;
        border: 1px solid var(--color-border);
        border-left: 3px solid var(--color-context);
        border-radius: 0.5rem;
        background: #FFFBF5;
      }

      .field-group {
        display: grid;
        gap: 0.375rem;
      }

      .field-label {
        color: var(--color-muted);
        font-size: 0.75rem;
        font-weight: 600;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .field-control {
        min-width: 180px;
        padding: 0.5rem 0.75rem;
        border: 1px solid var(--color-border);
        border-radius: 0.375rem;
        background: var(--color-surface);
        color: var(--color-ink);
        font-size: 0.875rem;
        outline: none;
        transition: border-color 0.15s ease, box-shadow 0.15s ease;
      }

      .field-control:focus {
        border-color: var(--color-accent);
        box-shadow: 0 0 0 2px rgba(185, 28, 28, 0.1);
      }

      .chip {
        display: inline-flex;
        align-items: center;
        border-radius: 0.25rem;
        background: var(--color-accent-light);
        border: 1px solid rgba(185, 28, 28, 0.15);
        padding: 0.2rem 0.6rem;
        color: var(--color-accent);
        font-size: 0.75rem;
        font-weight: 600;
        letter-spacing: 0.02em;
      }

      .note-box {
        padding: 0.875rem 1rem;
        border: 1px solid var(--color-border);
        border-radius: 0.5rem;
        background: #F8F9FB;
        color: var(--color-muted);
        font-size: 0.8rem;
        line-height: 1.7;
      }

      .video-frame {
        position: relative;
        width: 100%;
        overflow: hidden;
        border-radius: 0.5rem;
        background: #000;
        aspect-ratio: 16 / 9;
      }

      .video-frame iframe {
        width: 100%;
        height: 100%;
        border: 0;
      }

      .filter-chip {
        display: inline-flex;
        align-items: center;
        padding: 0.25rem 0.625rem;
        border: 1px solid var(--color-border);
        border-radius: 0.25rem;
        background: var(--color-surface);
        color: var(--color-muted);
        font-size: 0.75rem;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.1s ease, border-color 0.1s ease, color 0.1s ease;
      }

      .filter-chip:hover {
        background: #F4F6F9;
        border-color: #C4C9D4;
      }

      .filter-chip.is-on {
        background: var(--color-accent-light);
        border-color: rgba(185, 28, 28, 0.25);
        color: var(--color-accent);
        font-weight: 600;
      }

      .button-link {
        display: inline-flex;
        width: fit-content;
        align-items: center;
        justify-content: center;
        padding: 0.5rem 1rem;
        border-radius: 0.375rem;
        background: var(--color-accent);
        color: #fff;
        text-decoration: none;
        font-size: 0.875rem;
        font-weight: 600;
        transition: background 0.15s ease;
      }

      .button-link:hover {
        background: #991B1B;
      }

      @media (min-width: 768px) {
        .app-shell {
          padding: 1.5rem 2rem;
        }

        .hero-block {
          flex-direction: row;
          align-items: flex-start;
          justify-content: space-between;
        }

        .panel-header {
          padding: 1.25rem 1.5rem 1rem;
        }

        .panel-body {
          padding: 1.25rem 1.5rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <header class="hero-block" data-region="control-bar">
        <div>
          <p class="hero-eyebrow">時間中的音樂 Music in Time</p>
          <h1 class="hero-title">音樂家時間軸探索</h1>
          <p class="hero-subtitle">用時間作為閱讀軸線，串連音樂家的生平、作品與時代背景，讓古典音樂不只可聽，也更容易被理解。</p>
        </div>
        <div id="control-bar" class="w-full md:w-auto"></div>
      </header>

      <section class="panel-card mt-4" aria-labelledby="gantt-heading">
        <div class="panel-header">
          <h2 id="gantt-heading" class="panel-title">甘特圖時間軸</h2>
          <p class="panel-description">作曲家生涯與作品分布一覽，點擊圓點可切換預覽。</p>
        </div>
        <div id="gantt-view" class="panel-body"></div>
      </section>

      <main class="mt-4 grid gap-4 xl:grid-cols-[minmax(260px,1fr)_minmax(400px,1.6fr)_minmax(260px,1fr)]">
        <aside class="panel-card" aria-labelledby="timeline-heading">
          <div class="panel-header">
            <h2 id="timeline-heading" class="panel-title">時間軸</h2>
            <p class="panel-description">生平記事與作品清單。</p>
          </div>
          <section id="timeline-view" class="panel-body" style="max-height:640px;overflow-y:auto"></section>
        </aside>

        <section class="panel-card" aria-labelledby="preview-heading">
          <div class="panel-header">
            <h2 id="preview-heading" class="panel-title">作品預覽</h2>
            <p class="panel-description">選中作品的詳細資訊與影音內容。</p>
          </div>
          <section id="preview-panel" class="panel-body"></section>
        </section>

        <aside class="panel-card" aria-labelledby="guide-heading">
          <div class="panel-header">
            <h2 id="guide-heading" class="panel-title">音樂說明導聆</h2>
            <p class="panel-description">作品脈絡、時期定位與欣賞導引。</p>
          </div>
          <section id="guide-panel" class="panel-body"></section>
        </aside>
      </main>

      <section class="panel-card mt-4" aria-labelledby="context-heading">
        <div class="panel-header">
          <h2 id="context-heading" class="panel-title">時代背景層</h2>
          <p class="panel-description">補充歷史事件、文化環境與音樂風格趨勢。</p>
        </div>
        <section id="context-panel" class="panel-body"></section>
      </section>
    </div>

    <script type="module" src="./assets/js/app.js"></script>
  </body>
</html>
