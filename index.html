<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>時間中的音樂 Music in Time</title>
    <meta
      name="description"
      content="以時間軸連結音樂、作曲家生平與歷史脈絡的互動式網站。"
    >
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
      :root {
        --color-parchment: #f5f0e7;
        --color-ink: #241a13;
        --color-muted: #6b5a4c;
        --color-accent: #ac3b2d;
        --color-timeline: #365c7d;
        --color-context: #b5692f;
        --font-display: Georgia, "Times New Roman", serif;
        --font-body: "Segoe UI", "Noto Sans TC", sans-serif;
      }

      body {
        min-height: 100vh;
        color: var(--color-ink);
        background-color: var(--color-parchment);
        font-family: var(--font-body);
        background-image:
          radial-gradient(circle at top left, rgba(172, 59, 45, 0.14), transparent 24%),
          radial-gradient(circle at bottom right, rgba(54, 92, 125, 0.12), transparent 28%);
      }

      a {
        color: var(--color-accent);
      }

      .app-shell {
        width: 100%;
        max-width: 80rem;
        margin: 0 auto;
        padding: 1.5rem 1rem;
      }

      .hero-block {
        display: flex;
        flex-direction: column;
        gap: 1rem;
        border: 1px solid rgba(28, 25, 23, 0.1);
        border-radius: 2rem;
        background: rgba(255, 255, 255, 0.7);
        padding: 1.5rem;
        box-shadow: 0 18px 60px rgba(36, 26, 19, 0.08);
        backdrop-filter: blur(10px);
      }

      .hero-eyebrow {
        margin-bottom: 0.5rem;
        color: var(--color-accent);
        font-size: 0.75rem;
        font-weight: 700;
        letter-spacing: 0.22em;
        text-transform: uppercase;
      }

      .hero-title {
        font-family: var(--font-display);
        font-size: clamp(2.25rem, 5vw, 3.75rem);
        letter-spacing: 0.02em;
      }

      .hero-subtitle {
        max-width: 42rem;
        margin-top: 0.75rem;
        color: var(--color-muted);
        font-size: 0.95rem;
        line-height: 1.9;
      }

      .panel-card {
        border: 1px solid rgba(28, 25, 23, 0.1);
        border-radius: 1.75rem;
        background: rgba(255, 255, 255, 0.7);
        box-shadow: 0 14px 40px rgba(36, 26, 19, 0.08);
        backdrop-filter: blur(10px);
      }

      .panel-header {
        padding: 1.25rem 1.25rem 0;
      }

      .panel-title {
        font-family: var(--font-display);
        font-size: 1.5rem;
        letter-spacing: 0.02em;
      }

      .panel-description {
        margin-top: 0.5rem;
        color: var(--color-muted);
        font-size: 0.9rem;
        line-height: 1.7;
      }

      .panel-body {
        padding: 1.25rem;
      }

      .data-card {
        padding: 1rem;
        border: 1px solid rgba(28, 25, 23, 0.1);
        border-radius: 1rem;
        background: rgba(255, 255, 255, 0.65);
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
      }

      .data-card-meta {
        color: var(--color-muted);
        font-size: 0.875rem;
      }

      .timeline-button {
        display: grid;
        width: 100%;
        gap: 0.75rem;
        padding: 1rem;
        text-align: left;
        border: 1px solid rgba(28, 25, 23, 0.1);
        border-left: 4px solid var(--color-accent);
        border-radius: 1rem;
        background: rgba(255, 255, 255, 0.65);
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
        transition: transform 0.15s ease, box-shadow 0.15s ease;
      }

      .timeline-button:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 24px rgba(36, 26, 19, 0.08);
      }

      .timeline-button.is-active {
        border-color: var(--color-accent);
        box-shadow: 0 0 0 2px rgba(172, 59, 45, 0.15);
      }

      .timeline-event {
        border-left: 4px solid var(--color-timeline);
      }

      .context-card {
        border-left: 4px solid var(--color-context);
      }

      .field-group {
        display: grid;
        gap: 0.5rem;
      }

      .field-label {
        color: var(--color-muted);
        font-size: 0.875rem;
        font-weight: 600;
      }

      .field-control {
        min-width: 180px;
        padding: 0.75rem 1rem;
        border: 1px solid rgba(28, 25, 23, 0.1);
        border-radius: 0.75rem;
        background: #fff;
        color: var(--color-ink);
        outline: none;
        transition: border-color 0.15s ease, box-shadow 0.15s ease;
      }

      .field-control:focus {
        border-color: rgba(172, 59, 45, 0.4);
        box-shadow: 0 0 0 2px rgba(172, 59, 45, 0.15);
      }

      .chip {
        display: inline-flex;
        align-items: center;
        border-radius: 9999px;
        background: rgba(172, 59, 45, 0.08);
        padding: 0.25rem 0.75rem;
        color: var(--color-accent);
        font-size: 0.875rem;
        font-weight: 600;
      }

      .note-box {
        padding: 1rem;
        border: 1px dashed rgba(28, 25, 23, 0.15);
        border-radius: 1rem;
        background: rgba(245, 245, 244, 0.8);
        color: var(--color-muted);
        font-size: 0.875rem;
        line-height: 1.7;
      }

      .video-frame {
        position: relative;
        width: 100%;
        overflow: hidden;
        border-radius: 1rem;
        background: #000;
        aspect-ratio: 16 / 9;
      }

      .video-frame iframe {
        width: 100%;
        height: 100%;
        border: 0;
      }

      .button-link {
        display: inline-flex;
        width: fit-content;
        align-items: center;
        justify-content: center;
        padding: 0.75rem 1rem;
        border-radius: 9999px;
        background: var(--color-accent);
        color: #fff;
        text-decoration: none;
        font-size: 0.875rem;
        font-weight: 700;
        transition: opacity 0.15s ease;
      }

      .button-link:hover {
        opacity: 0.9;
      }

      @media (min-width: 768px) {
        .app-shell {
          padding: 2rem 1.5rem;
        }

        .hero-block {
          flex-direction: row;
          align-items: flex-start;
          justify-content: space-between;
        }

        .panel-header {
          padding: 1.5rem 1.5rem 0;
        }

        .panel-body {
          padding: 1.5rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <header class="hero-block" data-region="control-bar">
        <div>
          <p class="hero-eyebrow">時間中的音樂 Music in Time</p>
          <h1 class="hero-title">音樂家時間軸探索</h1>
          <p class="hero-subtitle">用時間作為閱讀軸線，串連音樂家的生平、作品與時代背景，讓古典音樂不只可聽，也更容易被理解。</p>
        </div>
        <div id="control-bar" class="w-full md:w-auto"></div>
      </header>

      <main class="mt-4 grid gap-4 xl:grid-cols-[minmax(280px,1fr)_minmax(420px,1.45fr)_minmax(300px,1fr)]">
        <aside class="panel-card" aria-labelledby="timeline-heading">
          <div class="panel-header">
            <h2 id="timeline-heading" class="panel-title">時間軸</h2>
            <p class="panel-description">在同一條時間軸上整合生平、作品與時代背景。</p>
          </div>
          <section id="timeline-view" class="panel-body"></section>
        </aside>

        <section class="panel-card" aria-labelledby="visualization-heading">
          <div class="panel-header">
            <h2 id="visualization-heading" class="panel-title">主視覺區</h2>
            <p class="panel-description">呈現作品類型、創作時期與分析視角的主要展示區。</p>
          </div>
          <section id="visualization-view" class="panel-body"></section>
        </section>

        <aside class="panel-card" aria-labelledby="preview-heading">
          <div class="panel-header">
            <h2 id="preview-heading" class="panel-title">內容預覽</h2>
            <p class="panel-description">顯示焦點作品、媒體與關聯說明。</p>
          </div>
          <section id="preview-panel" class="panel-body"></section>
        </aside>
      </main>

      <section class="panel-card mt-4" aria-labelledby="context-heading">
        <div class="panel-header">
          <h2 id="context-heading" class="panel-title">時代背景層</h2>
          <p class="panel-description">補充歷史事件、文化環境與音樂風格趨勢。</p>
        </div>
        <section id="context-panel" class="panel-body"></section>
      </section>
    </div>

    <script type="module" src="./assets/js/app.js"></script>
  </body>
</html>
