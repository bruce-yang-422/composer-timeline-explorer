<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Timeline of Music | Composer Timeline Explorer</title>
    <meta name="robots" content="index, follow">
    <meta name="author" content="Bruce Yang">
    <meta name="theme-color" content="#f8f3ea">
    <meta name="format-detection" content="telephone=no">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=UnifrakturCook:wght@700&display=swap" rel="stylesheet">
    <link rel="canonical" href="https://bruce-yang-422.github.io/composer-timeline-explorer/">
    <meta
      name="description"
      content="以時間軸探索音樂史，串連作曲家生平、代表作品與時代背景的互動式古典音樂網站。"
    >
    <meta
      name="keywords"
      content="Timeline of Music, Composer Timeline Explorer, 古典音樂, 作曲家, 音樂時間軸, Beethoven, 貝多芬, music history, composer timeline"
    >
    <meta property="og:locale" content="zh_TW">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Timeline of Music">
    <meta property="og:title" content="Timeline of Music | Composer Timeline Explorer">
    <meta
      property="og:description"
      content="以時間軸探索音樂史，串連作曲家生平、代表作品與時代背景的互動式古典音樂網站。"
    >
    <meta property="og:url" content="https://bruce-yang-422.github.io/composer-timeline-explorer/">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Timeline of Music | Composer Timeline Explorer">
    <meta
      name="twitter:description"
      content="以時間軸探索音樂史，串連作曲家生平、代表作品與時代背景的互動式古典音樂網站。"
    >
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Timeline of Music",
        "alternateName": "Composer Timeline Explorer",
        "url": "https://bruce-yang-422.github.io/composer-timeline-explorer/",
        "inLanguage": "zh-Hant",
        "description": "以時間軸探索音樂史，串連作曲家生平、代表作品與時代背景的互動式古典音樂網站。",
        "author": {
          "@type": "Person",
          "name": "Bruce Yang"
        }
      }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
      :root {
        /* ── Classical × Modern Palette ─────────────────────────────────── */
        --color-bg:           #E8E0D2;   /* warm parchment */
        --color-surface:      #FEFCF7;   /* ivory cream */
        --color-surface-alt:  #F7F2EA;   /* slightly warmer panel tint */
        --color-border:       #C8BDB0;   /* warm stone */
        --color-border-light: #DDD5C8;   /* lighter divider */
        --color-ink:          #1E1810;   /* deep warm near-black */
        --color-muted:        #7C7065;   /* warm taupe */
        --color-accent:       #6B2A2A;   /* deep claret / burgundy */
        --color-accent-light: #F8EDEC;   /* pale blush */
        --color-timeline:     #1C3D60;   /* prussian navy */
        --color-context:      #7A4618;   /* burnt sienna */
        --font-display: "Cormorant Garamond", Georgia, "Times New Roman", serif;
        --font-display-news: "UnifrakturCook", "Times New Roman", serif;
        --font-body: "Segoe UI", "Noto Sans TC", sans-serif;
      }

      body {
        min-height: 100vh;
        color: var(--color-ink);
        background-color: var(--color-bg);
        font-family: var(--font-body);
      }

      a {
        color: var(--color-accent);
      }

      .app-shell {
        width: 100%;
        max-width: 80rem;
        margin: 0 auto;
        padding: 1.5rem 1rem;
      }

      /* ── Hero ──────────────────────────────────────────────────────────── */
      .hero-block {
        display: flex;
        flex-direction: column;
        gap: 0.625rem;
        border: 1px solid #B8AC9C;
        border-radius: 0.375rem;
        background:
          linear-gradient(180deg, rgba(80, 55, 30, 0.07) 0%, rgba(80, 55, 30, 0.02) 100%),
          linear-gradient(135deg, #EDE3CF 0%, #F8F3E8 60%, #FDFAF3 100%);
        box-shadow:
          0 2px 8px rgba(30, 20, 8, 0.08),
          0 8px 24px rgba(30, 20, 8, 0.05);
        padding: 1rem 1.5rem;
      }

      .hero-eyebrow {
        margin-bottom: 0.25rem;
        color: var(--color-accent);
        font-size: 0.67rem;
        font-weight: 600;
        letter-spacing: 0.26em;
        text-transform: uppercase;
        opacity: 0.8;
      }

      .hero-title {
        font-family: var(--font-display-news);
        max-width: none;
        font-size: clamp(1.6rem, 3.5vw, 2.6rem);
        font-weight: 700;
        letter-spacing: 0.01em;
        color: var(--color-ink);
        line-height: 1.05;
        text-shadow: 0 1px 2px rgba(255, 248, 235, 0.6);
      }

      .hero-divider {
        width: min(100%, 32rem);
        height: 1px;
        margin-top: 0.5rem;
        background: linear-gradient(90deg, rgba(107, 42, 42, 0.7), rgba(107, 42, 42, 0.08));
      }

      .hero-title-secondary {
        margin-top: 0.35rem;
        color: var(--color-muted);
        font-size: 0.72rem;
        font-weight: 600;
        letter-spacing: 0.22em;
        text-transform: uppercase;
      }

      .hero-title-secondary strong {
        font-family: var(--font-display);
        font-size: 0.9rem;
        letter-spacing: 0.1em;
        color: var(--color-ink);
      }

      .hero-subtitle {
        display: none;
      }

      /* ── Panels ────────────────────────────────────────────────────────── */
      .panel-card {
        border: 1px solid var(--color-border-light);
        border-radius: 0.75rem;
        background: var(--color-surface);
        box-shadow: 0 1px 3px rgba(30, 20, 8, 0.06), 0 4px 12px rgba(30, 20, 8, 0.04);
      }

      .panel-header {
        padding: 1rem 1.25rem;
        border-bottom: 1px solid var(--color-border-light);
        background: var(--color-surface-alt);
        border-radius: 0.75rem 0.75rem 0 0;
      }

      .panel-title {
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--color-muted);
      }

      .panel-description {
        margin-top: 0.2rem;
        color: var(--color-muted);
        font-size: 0.78rem;
        line-height: 1.5;
        opacity: 0.85;
      }

      .panel-body {
        padding: 1rem;
      }

      /* ── Cards ─────────────────────────────────────────────────────────── */
      .data-card {
        padding: 0.875rem 1rem;
        border: 1px solid var(--color-border-light);
        border-radius: 0.5rem;
        background: var(--color-surface-alt);
      }

      .data-card-meta {
        color: var(--color-muted);
        font-size: 0.78rem;
        font-weight: 600;
        letter-spacing: 0.03em;
      }

      .timeline-button {
        display: grid;
        width: 100%;
        gap: 0.375rem;
        padding: 0.75rem 0.875rem;
        text-align: left;
        border: 1px solid var(--color-border-light);
        border-left: 2.5px solid var(--color-accent);
        border-radius: 0.375rem;
        background: var(--color-surface);
        transition: background 0.12s ease, box-shadow 0.12s ease;
        cursor: pointer;
      }

      .timeline-button:hover {
        background: var(--color-surface-alt);
        box-shadow: 0 1px 4px rgba(30, 20, 8, 0.07);
      }

      .timeline-button.is-active {
        border-left-color: var(--color-accent);
        background: var(--color-accent-light);
        box-shadow: 0 1px 4px rgba(107, 42, 42, 0.1);
      }

      .timeline-event {
        padding: 0.75rem 0.875rem;
        border: 1px solid var(--color-border-light);
        border-left: 2.5px solid var(--color-timeline);
        border-radius: 0.375rem;
        background: #EEF3FA;
      }

      .context-card {
        padding: 0.875rem 1rem;
        border: 1px solid var(--color-border-light);
        border-left: 2.5px solid var(--color-context);
        border-radius: 0.375rem;
        background: #FBF5EC;
      }

      /* ── Form controls ─────────────────────────────────────────────────── */
      .field-group {
        display: grid;
        gap: 0.375rem;
      }

      .field-label {
        color: var(--color-muted);
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .field-control {
        min-width: 180px;
        padding: 0.5rem 0.75rem;
        border: 1px solid var(--color-border);
        border-radius: 0.375rem;
        background: var(--color-surface);
        color: var(--color-ink);
        font-size: 0.875rem;
        outline: none;
        transition: border-color 0.15s ease, box-shadow 0.15s ease;
      }

      .field-control:focus {
        border-color: var(--color-accent);
        box-shadow: 0 0 0 2.5px rgba(107, 42, 42, 0.12);
      }

      /* ── Chips & tags ──────────────────────────────────────────────────── */
      .chip {
        display: inline-flex;
        align-items: center;
        border-radius: 0.25rem;
        background: var(--color-accent-light);
        border: 1px solid rgba(107, 42, 42, 0.2);
        padding: 0.18rem 0.55rem;
        color: var(--color-accent);
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.03em;
      }

      .note-box {
        padding: 0.875rem 1rem;
        border: 1px solid var(--color-border-light);
        border-radius: 0.5rem;
        background: var(--color-surface-alt);
        color: var(--color-muted);
        font-size: 0.8rem;
        line-height: 1.7;
      }

      .video-frame {
        position: relative;
        width: 100%;
        overflow: hidden;
        border-radius: 0.5rem;
        background: #0A0806;
        aspect-ratio: 16 / 9;
      }

      .video-frame iframe {
        width: 100%;
        height: 100%;
        border: 0;
      }

      .filter-chip {
        display: inline-flex;
        align-items: center;
        padding: 0.25rem 0.625rem;
        border: 1px solid var(--color-border-light);
        border-radius: 0.25rem;
        background: var(--color-surface);
        color: var(--color-muted);
        font-size: 0.72rem;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.12s ease, border-color 0.12s ease, color 0.12s ease;
      }

      .filter-chip:hover {
        background: var(--color-surface-alt);
        border-color: var(--color-border);
        color: var(--color-ink);
      }

      .filter-chip.is-on {
        background: var(--color-accent-light);
        border-color: rgba(107, 42, 42, 0.3);
        color: var(--color-accent);
        font-weight: 700;
      }

      .button-link {
        display: inline-flex;
        width: fit-content;
        align-items: center;
        justify-content: center;
        padding: 0.5rem 1rem;
        border-radius: 0.375rem;
        background: var(--color-accent);
        color: #FDF8F3;
        text-decoration: none;
        font-size: 0.875rem;
        font-weight: 600;
        letter-spacing: 0.02em;
        transition: background 0.15s ease, box-shadow 0.15s ease;
      }

      .button-link:hover {
        background: #511E1E;
        box-shadow: 0 2px 8px rgba(107, 42, 42, 0.25);
      }

      @media (min-width: 768px) {
        .app-shell {
          padding: 1.5rem 2rem;
        }

        .hero-block {
          flex-direction: row;
          align-items: flex-start;
          justify-content: space-between;
        }

        .panel-header {
          padding: 1rem 1.5rem;
        }

        .panel-body {
          padding: 1.25rem 1.5rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <header class="hero-block" data-region="control-bar">
        <div>
          <p class="hero-eyebrow">時間中的音樂 Music in Time</p>
          <h1 class="hero-title">Timeline of Music</h1>
          <div class="hero-divider" aria-hidden="true"></div>
          <p class="hero-title-secondary"><strong>Composer Timeline Explorer</strong></p>
          <p class="hero-subtitle">用時間作為閱讀軸線，串連音樂家的生平、作品與時代背景，讓古典音樂不只可聽，也更容易被理解。</p>
        </div>
        <div id="control-bar" class="w-full md:w-auto"></div>
      </header>

      <section class="panel-card mt-4" aria-labelledby="gantt-heading">
        <div class="panel-header">
          <h2 id="gantt-heading" class="panel-title">甘特圖時間軸</h2>
          <p class="panel-description">作曲家生涯與作品分布一覽，點擊圓點可切換預覽。</p>
        </div>
        <div id="gantt-view" class="panel-body"></div>
      </section>

      <main class="mt-4 grid gap-4 xl:grid-cols-[minmax(260px,1fr)_minmax(400px,1.6fr)_minmax(260px,1fr)]">
        <aside class="panel-card" aria-labelledby="timeline-heading">
          <div class="panel-header">
            <h2 id="timeline-heading" class="panel-title">時間軸</h2>
            <p class="panel-description">生平記事與作品清單。</p>
          </div>
          <div id="timeline-filters" style="padding:0.5rem 1rem;border-bottom:1px solid var(--color-border);background:var(--color-surface)"></div>
          <section id="timeline-view" class="panel-body" style="height:calc(100vh - 280px);overflow-y:auto"></section>
        </aside>

        <section class="panel-card" aria-labelledby="preview-heading">
          <div class="panel-header">
            <h2 id="preview-heading" class="panel-title">作品預覽</h2>
            <p class="panel-description">選中作品的詳細資訊與影音內容。</p>
          </div>
          <section id="preview-panel" class="panel-body"></section>
        </section>

        <aside class="panel-card" aria-labelledby="guide-heading">
          <div class="panel-header">
            <h2 id="guide-heading" class="panel-title">音樂說明導聆</h2>
            <p class="panel-description">作品脈絡、時期定位與欣賞導引。</p>
          </div>
          <section id="guide-panel" class="panel-body"></section>
        </aside>
      </main>

      <section class="panel-card mt-4" aria-labelledby="context-heading">
        <div class="panel-header">
          <h2 id="context-heading" class="panel-title">時代背景層</h2>
          <p class="panel-description">補充歷史事件、文化環境與音樂風格趨勢。</p>
        </div>
        <section id="context-panel" class="panel-body"></section>
      </section>
    </div>

    <script type="module" src="./assets/js/app.js"></script>
  </body>
</html>
